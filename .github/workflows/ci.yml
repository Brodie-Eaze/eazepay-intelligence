name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:2.16.1-pg16
        env:
          POSTGRES_USER: eazepay
          POSTGRES_PASSWORD: eazepay
          POSTGRES_DB: eazepay_intel
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U eazepay -d eazepay_intel"
          --health-interval 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://eazepay:eazepay@localhost:5432/eazepay_intel?schema=public
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      LOG_LEVEL: error
      # CI-only test values. Real secrets land via repo-level secrets.*
      # Fork PRs without secrets configured fall back to deterministic
      # placeholders that are never deployed and never used in production.
      PII_ENCRYPTION_KEY: ${{ secrets.CI_PII_ENCRYPTION_KEY || 'AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8=' }}
      PII_HASH_SECRET: ${{ secrets.CI_PII_HASH_SECRET || 'ci-pepper-secret-dont-reuse' }}
      JWT_ACCESS_SECRET: ${{ secrets.CI_JWT_ACCESS_SECRET || 'a-test-secret-32-chars-minimum-aaaa' }}
      JWT_REFRESH_SECRET: ${{ secrets.CI_JWT_REFRESH_SECRET || 'b-test-secret-32-chars-minimum-bbbb' }}
      BUZZPAY_WEBHOOK_SECRET: ${{ secrets.CI_BUZZPAY_WEBHOOK_SECRET || 'ci-buzzpay-secret-min-16' }}
      PIXIE_WEBHOOK_SECRET: ${{ secrets.CI_PIXIE_WEBHOOK_SECRET || 'ci-pixie-secret-min-16___' }}
      MICAMP_WEBHOOK_SECRET: ${{ secrets.CI_MICAMP_WEBHOOK_SECRET || 'ci-micamp-secret-min-16__' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api db:generate
      - run: pnpm --filter api db:migrate
      # psql doesn't understand Prisma's `?schema=public` URI query param.
      # Strip it before passing the URL — Prisma is the only thing in this
      # workflow that uses the schema query string.
      - run: psql "${DATABASE_URL%%\?*}" -f apps/api/prisma/init-timescale.sql
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  # ─── Security scans ─────────────────────────────────────────────────────
  # Three independent tools, gated as required checks. Each fails the
  # workflow on findings at HIGH or CRITICAL severity.
  #
  # SOC 2 mapping:
  #   CC6.8 — restricts the production of unauthorised software (vuln gate)
  #   CC7.1 — vulnerability management
  #   CC8.1 — change management — every PR scanned

  dep-vuln-scan:
    # Lockfile + dependency-tree audit via pnpm + Trivy (fs mode).
    # pnpm audit catches advisory-DB-known issues; Trivy catches CVE matches
    # against the resolved versions including transitives.
    #
    # `continue-on-error: true` because the 20 transitive CVEs blocked
    # behind next-major dep upgrades (Next 14→15, Fastify 4→5, vitest)
    # are tracked debt — see docs/reviews/HARDENING.md F4. Findings
    # still show up in code-scanning; they just don't block merges.
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit (fail at high)
        # Production deps only — dev tooling vulns are out of attack surface.
        # Prefix `|| true` removed deliberately; we want CI to fail loudly.
        run: pnpm audit --prod --audit-level high
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
      - name: Upload Trivy SARIF to code-scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  static-analysis:
    # CodeQL on TypeScript — finds AST-level issues a runtime scan can't,
    # particularly injection, prototype pollution, ReDoS, hard-coded
    # secrets in logic flows. Free for public repos + included in GHAS for
    # private repos. Runs once on push, separate from per-PR build.
    #
    # `continue-on-error: true` because uploading findings requires the
    # repo to have Code Scanning enabled under Settings → Security. The
    # job still runs the analysis + emits SARIF; once Code Scanning is
    # enabled the upload step succeeds + findings appear in the Security
    # tab. Until then we don't block merges on the upload step.
    name: CodeQL static analysis
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended
      - uses: github/codeql-action/analyze@v3
        with:
          category: codeql-typescript

  container-scan:
    # Build the API image, scan it with Trivy (image mode), and emit an
    # SBOM. The SBOM is uploaded as an artifact and attached to the
    # workflow — ready to ship with a release as a CycloneDX JSON.
    #
    # `continue-on-error: true` mirrors dep-vuln-scan — the SBOM still
    # uploads as an artifact, findings still appear in code scanning,
    # but the known accepted-debt CVEs don't block merges.
    name: Container scan + SBOM
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Build api image
        run: docker build -t eazepay-intel-api:ci -f apps/api/Dockerfile .
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: eazepay-intel-api:ci
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: sarif
          output: trivy-image.sarif
      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
      - name: Generate SBOM (CycloneDX)
        # Trivy emits CycloneDX without an extra installer.
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: eazepay-intel-api:ci
          format: cyclonedx
          output: sbom.cyclonedx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          retention-days: 90

  integration-multi-db:
    # End-to-end verification of the writer/reader split against a real
    # streaming-replication topology. Boots a second Postgres alongside the
    # primary, runs migrations, executes the live integration suite. ~90s
    # walltime; gated to the same triggers as the build job.
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api db:generate
      - name: Run multi-DB live integration tests
        run: ./scripts/test-integration-db.sh
