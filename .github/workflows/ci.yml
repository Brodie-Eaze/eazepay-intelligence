name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:2.16.1-pg16
        env:
          POSTGRES_USER: eazepay
          POSTGRES_PASSWORD: eazepay
          POSTGRES_DB: eazepay_intel
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U eazepay -d eazepay_intel"
          --health-interval 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://eazepay:eazepay@localhost:5432/eazepay_intel?schema=public
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      LOG_LEVEL: error
      PII_ENCRYPTION_KEY: AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8=
      PII_HASH_SECRET: ci-pepper-secret-dont-reuse
      JWT_ACCESS_SECRET: ${{ secrets.CI_JWT_ACCESS_SECRET || 'a-test-secret-32-chars-minimum-aaaa' }}
      JWT_REFRESH_SECRET: ${{ secrets.CI_JWT_REFRESH_SECRET || 'b-test-secret-32-chars-minimum-bbbb' }}
      BUZZPAY_WEBHOOK_SECRET: ci-buzzpay-secret-min-16
      PIXIE_WEBHOOK_SECRET: ci-pixie-secret-min-16___
      MICAMP_WEBHOOK_SECRET: ci-micamp-secret-min-16__
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api db:generate
      - run: pnpm --filter api db:migrate
      - run: psql "$DATABASE_URL" -f apps/api/prisma/init-timescale.sql
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  integration-multi-db:
    # End-to-end verification of the writer/reader split against a real
    # streaming-replication topology. Boots a second Postgres alongside the
    # primary, runs migrations, executes the live integration suite. ~90s
    # walltime; gated to the same triggers as the build job.
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api db:generate
      - name: Run multi-DB live integration tests
        run: ./scripts/test-integration-db.sh
