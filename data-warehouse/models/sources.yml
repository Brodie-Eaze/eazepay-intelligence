version: 2

# Raw operational tables managed by Prisma in the API's `public` schema.
# dbt does NOT own these — it only reads. Schema changes flow from
# `apps/api/prisma/schema.prisma`; this sources block must be kept in
# sync when adding columns the warehouse cares about.
#
# `loaded_at_field` is set where a usable timestamp exists; `freshness`
# alerts fire when the operational data stops flowing (worker outage,
# vendor outage, ingestion auth issue).

sources:
  - name: platform
    description: 'Operational rows from the EazePay platform Postgres'
    database: eazepay_platform
    schema: public
    tables:
      - name: organizations
        description: 'Tenant rows. Each business is one org.'
        columns:
          - name: id
            tests: [unique, not_null]
          - name: slug
            tests: [unique, not_null]
          - name: name
            tests: [not_null]
          - name: deleted_at

      - name: memberships
        description: 'User × Organization × OrgRole join.'
        columns:
          - name: id
            tests: [unique, not_null]
          - name: user_id
            tests: [not_null]
          - name: org_id
            tests: [not_null]

      - name: partners
        description: 'Per-org partner businesses (downstream customers of each tenant).'
        loaded_at_field: updated_at
        freshness:
          warn_after: { count: 24, period: hour }
          error_after: { count: 72, period: hour }

      - name: applications
        description: 'Loan / BNPL applications submitted via a partner.'
        loaded_at_field: created_at
        freshness:
          warn_after: { count: 6, period: hour }
          error_after: { count: 24, period: hour }

      - name: lender_decisions
        description: 'Lender outcomes for an application — APPROVED / DECLINED / PENDING.'
        loaded_at_field: created_at

      - name: revenue_events
        description: 'Append-only revenue ledger. Source of truth for all financial rollups.'
        loaded_at_field: effective_at
        freshness:
          warn_after: { count: 12, period: hour }
          error_after: { count: 48, period: hour }

      - name: pixie_metrics
        description: 'Time-series Pixie usage per partner per period.'
        loaded_at_field: period_start

      - name: portfolio_businesses
        description: 'Holdco rollup metadata per business (TTM revenue, EBITDA, FTE, etc.).'

      - name: webhook_events
        description: 'Raw inbound webhook events from vendors + ingestion API.'
        loaded_at_field: received_at
        freshness:
          warn_after: { count: 1, period: hour }
          error_after: { count: 6, period: hour }
